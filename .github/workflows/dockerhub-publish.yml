name: Build & Push to Docker Hub

# Manually triggered only (Actions tab -> "Run workflow").
# Builds a multi-arch (amd64 + arm64) image on native runners and pushes a
# single merged manifest to Docker Hub.
on:
  workflow_dispatch:
    inputs:
      image_repo:
        description: "Docker Hub repository (username/repo). Leave blank to use <DOCKER_USERNAME>/ocr-mcp."
        required: false
        default: ""
      tag:
        description: "Image tag to publish."
        required: true
        default: "latest"
      also_latest:
        description: "Also retag the image as :latest (ignored when tag is already latest)."
        type: boolean
        required: false
        default: true

permissions:
  contents: read

# Full image path without registry prefix, e.g. "myname/ocr-mcp".
# Falls back to <DOCKER_USERNAME>/ocr-mcp when image_repo is left blank.
env:
  IMAGE: ${{ (inputs.image_repo != '' && inputs.image_repo) || format('{0}/ocr-mcp', secrets.DOCKER_USERNAME) }}

jobs:
  # Build each architecture independently on a native runner (no QEMU), pushing
  # the per-platform image by digest. Native builds are far faster than QEMU for
  # the paddlepaddle install + model warmup steps in this image.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            slug: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            slug: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=docker.io/${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=dockerhub-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=dockerhub-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
          echo "Built ${{ matrix.platform }} -> ${digest}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Merge the per-architecture digests into one multi-arch manifest and apply
  # the final tags on Docker Hub.
  merge:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          IMAGE: docker.io/${{ env.IMAGE }}
          TAG: ${{ inputs.tag }}
          ALSO_LATEST: ${{ inputs.also_latest }}
        run: |
          set -euo pipefail
          TAGS=(-t "${IMAGE}:${TAG}")
          if [ "${ALSO_LATEST}" = "true" ] && [ "${TAG}" != "latest" ]; then
            TAGS+=(-t "${IMAGE}:latest")
          fi
          docker buildx imagetools create "${TAGS[@]}" \
            $(printf '%s@sha256:%s ' "$IMAGE" *)

      - name: Inspect image
        env:
          IMAGE: docker.io/${{ env.IMAGE }}
          TAG: ${{ inputs.tag }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:${TAG}" --raw
